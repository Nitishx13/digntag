<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Add Hindi Shayari</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        .result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Add Hindi Shayari</h1>
    
    <form id="shayariForm">
        <div class="form-group">
            <label for="language">Language:</label>
            <select id="language" name="language">
                <option value="Hindi">Hindi</option>
                <option value="English">English</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="lineCount">Line Count:</label>
            <select id="lineCount" name="lineCount">
                <option value="2">2 Lines</option>
                <option value="4">4 Lines</option>
                <option value="8">8 Lines</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="text">Shayari Text:</label>
            <textarea id="text" name="text" rows="4" placeholder="Enter shayari here...">तेरी यादें मेरे दिल में,
हर पल तेरा ही खयाल रहता है।</textarea>
        </div>
        
        <div class="form-group">
            <label for="recipient">Recipient:</label>
            <select id="recipient" name="recipient">
                <option value="Partner">Partner</option>
                <option value="Friend">Friend</option>
                <option value="Mother">Mother</option>
                <option value="Father">Father</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="messageType">Message Type:</label>
            <select id="messageType" name="messageType">
                <option value="Love and Romance">Love and Romance</option>
                <option value="Friendship">Friendship</option>
                <option value="Thank You">Thank You</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="story">Story (Optional):</label>
            <textarea id="story" name="story" rows="2" placeholder="Enter story...">Romantic memories</textarea>
        </div>
        
        <button type="submit">Add Shayari</button>
    </form>
    
    <div id="result" class="result"></div>

    <script>
        document.getElementById('shayariForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                language: document.getElementById('language').value,
                lineCount: document.getElementById('lineCount').value,
                text: document.getElementById('text').value,
                recipient: document.getElementById('recipient').value,
                messageType: document.getElementById('messageType').value,
                story: document.getElementById('story').value
            };
            
            try {
                const response = await fetch('https://www.digntag.in/api/admin-shayari-manage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = 
                    '<h3>' + (result.success ? 'SUCCESS' : 'ERROR') + '</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>ERROR</h3><pre>' + error.message + '</pre>';
            }
        });
    </script>
</body>
</html>
